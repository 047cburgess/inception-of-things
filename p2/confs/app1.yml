apiVersion: v1
kind: Service
metadata:
  name: app-one
spec:
  ports:
    - port: 80
      protocol: TCP
  selector:
    app: app-one

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-one
spec:
  selector:
    matchLabels:
      app: app-one
  replicas: 1
  template:
    metadata:
      labels:
        app: app-one
    spec:
      containers:
      - name: nginx
        image: nginxdemos/hello
        ports:
        - containerPort: 80
